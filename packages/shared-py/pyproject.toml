[project]
name = "shared-py"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "pydantic[email]>=2.0",
    "pydantic-settings>=2.0",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg",
    "python-jose[cryptography]",
    "bcrypt>=4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/starter_shared"]
